        Content = """


I am Ehsan (/ɛhˈsɑːn/), postdoc researcher working on neural signal procesing at [Columbia University](https://www.columbia.edu) and [New York State psychiatric Iinstitute](https://www.nyspi.org). I'm currently working on brain oscillatory dynamics at @[Haegens lab (brain rhythms)](https://www.haegenslab.com/people).

 Broad interests in signal processing, graph theory, sparsity, optimization, and ML. 
 
 Passionate about fundamental questions (in neural systems)!

---

