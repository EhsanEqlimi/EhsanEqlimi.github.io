theme = 'PaperMod'

defaultContentLanguage = "en"

[languages]

  [languages.en]
    title = "Ehsan Eqlimi"
    languageName = "English"
    weight = 1

    [languages.en.params]
      [languages.en.params.homeInfoParams]
        Title = "Neuroimager"
        Content = """
👋 Welcome!

I am Ehsan (pronounced /ɛhˈsɑːn/ or “eh+sun”), postdoc researcher in neuroimaging (EEG and fMRI). I have broad interests in signal processing, graph theory, sparsity, optimization, and ML.

Focused on fundamental research (in neural system)
"""

  [languages.fa]
    title = "احسان اقلیمی"
    languageName = "فارسی"
    weight = 2

    [languages.fa.params]
      [languages.fa.params.homeInfoParams]
        Title = "نوروايميجِر"
        Content = """

## 👋 سلام

من احسان هستم. پژوهشگرِ پسادکترا در مرکزِ "اینریا" در دانشگاهِ رِنِ فرانسه.

در این حوزه‌ها کار می‌کنم:
- نوروایمیجینگ/ تصویر برداریِ عصبی(EEG، fMRI)
- پردازش سیگنال
- یادگیری ماشین

- دکترای مهندسی پزشکی از دانشگاهِ خِنتِ بلژیک  
- علاقه‌مند به پژوهش بنیادی

یه کانال یوتیوب فارسی هم دارم:  
[eq-line](https://www.youtube.com/@Ehsaneqlimi)
"""


  [languages.fr]
    title = "Ehsan Eqlimi"
    languageName = "Français"
    weight = 3

    [languages.fr.params]
      [languages.fr.params.homeInfoParams]
        Title = "Chercheur en neuroimagerie"
        Content = """
👋 Bonjour

Je suis Ehsan (prononcé /ɛhˈsɑːn/ ou « eh+sun »). Si c’est plus simple, vous pouvez m’appeler Sonny.

Je travaille en neuroimagerie (EEG, IRMf), en traitement du signal et en apprentissage automatique (machine learning).

- Doctorat en génie biomédical de l’Université de Gand (Belgique)  
- Intéressé par la recherche fondamentale
"""



