        Title = "Chercheur en neuroimagerie"
        Content = """
👋 Bonjour

Je suis Ehsan (/ɛhˈsɑːn/), chercheur postdoctoral en traitement des signaux neuronaux à [Columbia University](https://www.columbia.edu). Je travaille actuellement sur la dynamique des oscillations cérébrales au [New York State Psychiatric Institute](https://www.nyspi.org), en collaboration avec le [Haegens Lab (Brain Rhythms)](https://www.haegenslab.com/people).

Mes intérêts de recherche portent sur le traitement du signal, la théorie des graphes, la parcimonie, l’optimisation et l’apprentissage automatique.

Je m’intéresse particulièrement aux questions fondamentales en neurosciences des systèmes.

---

## Expérience professionnelle

- *Postdoctorant*, [Haegens Lab (Brain Rhythms)](https://www.haegenslab.com/people), Columbia University, New York, États-Unis [juin 2026 – aujourd’hui]  
- *Postdoctorant*, AI4Health Lab, EURECOM, Sophia Antipolis, France [juil. 2025 – févr. 2026]  
- *Data scientist*, AZORG (anciennement OLV) Hospital, Alost, Belgique [avr. 2023 – juin 2025]  
- *Postdoctorant*, BEAMS Lab, Université libre de Bruxelles, Belgique [janv. 2023 – mars 2023]  
- *Postdoctorant et doctorant*, WAVES Group, Université de Gand / imec, Belgique [nov. 2017 – déc. 2022]  
- *Chercheur prédoctoral*, département de génie biomédical, Université de Téhéran, Iran [juil. 2015 – sept. 2017]  
- *Ingénieur en traitement d’images*, industrie (Oloum-e-Sabz et Matiran), Téhéran, Iran [nov. 2011 – juin 2015]
"""
